<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Al-Akl Logistics — Baghdad, Iraq</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <!-- Firebase Compat SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --bg: #080d18;
      --bg2: #0e1628;
      --bg3: #131e35;
      --gold: #d4af37;
      --gold2: #f0d060;
      --blue: #1a56db;
      --text: #e8eaf0;
      --muted: #7a8499;
      --border: rgba(255, 255, 255, 0.07);
      --success: #10b981;
      --danger: #ef4444;
      --warn: #f59e0b;
      --glass: rgba(255, 255, 255, 0.03);
      --radius: 14px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
      background-image: radial-gradient(ellipse at 10% 60%, rgba(26, 86, 219, .12) 0%, transparent 55%),
        radial-gradient(ellipse at 90% 20%, rgba(212, 175, 55, .08) 0%, transparent 55%);
    }

    /* LOADING SCREEN */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    #loading-screen h2 {
      font-size: 1.5rem;
      color: var(--gold);
    }

    #loading-screen p {
      color: var(--muted);
      font-size: .9rem;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    /* SIDEBAR */
    .sidebar {
      width: 250px;
      min-width: 250px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 50;
    }

    .sidebar-logo {
      padding: 1.8rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, rgba(212, 175, 55, .08), transparent);
    }

    .sidebar-logo .icon {
      font-size: 2rem;
      color: var(--gold);
      margin-bottom: .4rem;
    }

    .sidebar-logo h2 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .5px;
    }

    .sidebar-logo p {
      font-size: .72rem;
      color: var(--muted);
      margin-top: .2rem;
    }

    .nav-section {
      padding: 1rem .8rem .5rem;
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      font-weight: 600;
    }

    .nav-links {
      list-style: none;
      padding: 0 .8rem;
      flex: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: .85rem;
      padding: .85rem 1rem;
      border-radius: 10px;
      cursor: pointer;
      color: var(--muted);
      font-size: .9rem;
      font-weight: 500;
      transition: all .25s;
      margin-bottom: .25rem;
    }

    .nav-item i {
      width: 18px;
      text-align: center;
      font-size: .92rem;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, .04);
      color: var(--text);
    }

    .nav-item.active {
      background: linear-gradient(135deg, rgba(212, 175, 55, .18), rgba(212, 175, 55, .04));
      color: var(--gold);
      border: 1px solid rgba(212, 175, 55, .25);
    }

    .sidebar-bottom {
      padding: 1rem;
      border-top: 1px solid var(--border);
    }

    #logout-btn {
      display: none;
      width: 100%;
      padding: .7rem;
      background: rgba(239, 68, 68, .1);
      border: 1px solid rgba(239, 68, 68, .3);
      color: var(--danger);
      border-radius: 10px;
      cursor: pointer;
      font-size: .85rem;
      font-weight: 600;
      transition: all .2s;
    }

    #logout-btn:hover {
      background: var(--danger);
      color: #fff;
    }

    /* MAIN */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }

    .topbar-left h3 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .topbar-left p {
      font-size: .78rem;
      color: var(--muted);
    }

    .user-badge {
      display: flex;
      align-items: center;
      gap: .7rem;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: .4rem 1rem;
      font-size: .82rem;
    }

    .user-badge i {
      color: var(--gold);
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
    }

    .content::-webkit-scrollbar {
      width: 5px;
    }

    .content::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 5px;
    }

    /* PANELS & CARDS */
    .panel {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.8rem;
      backdrop-filter: blur(8px);
    }

    .panel h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: .6rem;
    }

    .panel h3 i {
      color: var(--gold);
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .grid3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.2rem;
    }

    .grid4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.2rem;
    }

    .stat-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: transform .3s, border-color .3s;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      border-color: rgba(212, 175, 55, .3);
    }

    .stat-card .label {
      font-size: .78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: .5rem;
    }

    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
    }

    .stat-card .icon {
      font-size: 1.6rem;
      color: var(--gold);
      margin-bottom: .8rem;
    }

    .service-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      text-align: center;
      transition: all .3s;
    }

    .service-card:hover {
      border-color: rgba(212, 175, 55, .3);
      transform: translateY(-6px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, .4);
    }

    .service-card .sicon {
      font-size: 2.5rem;
      color: var(--gold);
      margin-bottom: 1rem;
    }

    .service-card h3 {
      font-size: 1rem;
      margin-bottom: .6rem;
    }

    .service-card p {
      font-size: .85rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* FORMS */
    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: .45rem;
      font-weight: 500;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: .75rem 1rem;
      background: rgba(0, 0, 0, .25);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
      font-family: 'Outfit', sans-serif;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--gold);
    }

    select option {
      background: var(--bg2);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    /* BUTTONS */
    .btn {
      padding: .7rem 1.4rem;
      border-radius: 9px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: .88rem;
      transition: all .25s;
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-family: 'Outfit', sans-serif;
    }

    .btn-gold {
      background: linear-gradient(135deg, var(--gold), #b8920f);
      color: #000;
    }

    .btn-gold:hover {
      background: var(--gold2);
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(212, 175, 55, .35);
    }

    .btn-blue {
      background: var(--blue);
      color: #fff;
    }

    .btn-blue:hover {
      opacity: .9;
      transform: translateY(-2px);
    }

    .btn-ghost {
      background: rgba(255, 255, 255, .05);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, .09);
    }

    .btn-danger {
      background: rgba(239, 68, 68, .12);
      border: 1px solid rgba(239, 68, 68, .3);
      color: var(--danger);
    }

    .btn-danger:hover {
      background: var(--danger);
      color: #fff;
    }

    .btn-wa {
      background: #25d366;
      color: #fff;
    }

    .btn-wa:hover {
      background: #128c7e;
    }

    .btn-sm {
      padding: .45rem .9rem;
      font-size: .8rem;
    }

    .full {
      width: 100%;
    }

    .mt1 {
      margin-top: .8rem;
    }

    .mt2 {
      margin-top: 1.5rem;
    }

    .mt3 {
      margin-top: 2rem;
    }

    .mb1 {
      margin-bottom: .8rem;
    }

    .mb2 {
      margin-bottom: 1.5rem;
    }

    .gap1 {
      gap: .8rem;
    }

    .flex {
      display: flex;
      align-items: center;
    }

    .flex-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: .8rem;
    }

    /* TABLES */
    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: .8rem;
    }

    th,
    td {
      padding: .85rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: .87rem;
    }

    th {
      color: var(--muted);
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .8px;
      font-weight: 600;
    }

    tr:hover td {
      background: rgba(255, 255, 255, .015);
    }

    /* BADGES */
    .badge {
      padding: .2rem .7rem;
      border-radius: 20px;
      font-size: .72rem;
      font-weight: 600;
    }

    .badge-gold {
      background: rgba(212, 175, 55, .15);
      color: var(--gold);
    }

    .badge-blue {
      background: rgba(26, 86, 219, .15);
      color: #60a5fa;
    }

    .badge-green {
      background: rgba(16, 185, 129, .15);
      color: var(--success);
    }

    .badge-red {
      background: rgba(239, 68, 68, .15);
      color: var(--danger);
    }

    .badge-warn {
      background: rgba(245, 158, 11, .15);
      color: var(--warn);
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 3rem 2rem 2rem;
    }

    .hero h1 {
      font-size: 3.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: 1.1rem;
      color: var(--muted);
      max-width: 650px;
      margin: 0 auto 2rem;
      line-height: 1.7;
    }

    /* LOGIN */
    .login-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
      animation: popIn .4s cubic-bezier(.175, .885, .32, 1.275);
    }

    .login-box h2 {
      font-size: 1.4rem;
      margin-bottom: .4rem;
      font-weight: 700;
    }

    .login-box p {
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    /* CALCULATOR */
    .calc-result {
      background: linear-gradient(135deg, rgba(16, 185, 129, .08), rgba(16, 185, 129, .02));
      border: 1px solid rgba(16, 185, 129, .25);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-top: 1.2rem;
    }

    /* RECEIPT */
    .receipt {
      background: #fff;
      color: #111;
      padding: 2rem;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
    }

    .receipt-header {
      border-bottom: 3px solid #d4af37;
      padding-bottom: 1rem;
      margin-bottom: 1rem;
    }

    .receipt-row {
      display: flex;
      justify-content: space-between;
      padding: .4rem 0;
      border-bottom: 1px dashed #ddd;
      font-size: .88rem;
    }

    .receipt-total {
      display: flex;
      justify-content: space-between;
      padding: 1rem 0 0;
      font-size: 1.2rem;
      font-weight: 700;
      border-top: 2px solid #111;
    }

    /* TOAST */
    #toasts {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }

    .toast {
      background: var(--bg2);
      border: 1px solid var(--gold);
      border-radius: 10px;
      padding: .9rem 1.3rem;
      font-size: .87rem;
      display: flex;
      align-items: center;
      gap: .7rem;
      animation: slideR .3s ease;
      box-shadow: var(--shadow);
    }

    /* INNER TABS */
    .inner-tabs {
      display: flex;
      gap: .5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .inner-tab {
      padding: .55rem 1.2rem;
      border-radius: 30px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: .85rem;
      font-weight: 500;
      font-family: 'Outfit', sans-serif;
      transition: all .2s;
    }

    .inner-tab.active {
      background: rgba(212, 175, 55, .15);
      border-color: rgba(212, 175, 55, .4);
      color: var(--gold);
    }

    /* EXPENSE ITEM */
    .exp-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .8rem 1rem;
      border-radius: 9px;
      background: rgba(255, 255, 255, .03);
      border: 1px solid var(--border);
      margin-bottom: .5rem;
    }

    hr.div {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    /* ANIMATIONS */
    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(.9)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    @keyframes slideR {
      from {
        transform: translateX(120%);
        opacity: 0
      }

      to {
        transform: translateX(0);
        opacity: 1
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .fade-up {
      animation: fadeUp .5s ease;
    }

    /* SYNC INDICATOR */
    .sync-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      display: inline-block;
      margin-right: .4rem;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .4
      }
    }
  </style>
</head>

<body>

  <!-- LOADING SCREEN -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <h2>Al-Akl Logistics</h2>
    <p id="load-msg">Connecting to Firebase...</p>
  </div>

  <!-- SIDEBAR -->
  <nav class="sidebar" id="app-sidebar" style="display:none">
    <div class="sidebar-logo">
      <div class="icon"><i class="fas fa-truck-fast"></i></div>
      <h2>Al-Akl</h2>
      <p>Logistics &amp; Delivery — Baghdad</p>
    </div>
    <p class="nav-section">Navigation</p>
    <ul class="nav-links" id="nav-links">
      <li class="nav-item active" data-tab="public"><i class="fas fa-globe"></i> Public Portal</li>
      <li class="nav-item" data-tab="client"><i class="fas fa-user-tie"></i> Client Hub</li>
      <li class="nav-item" data-tab="driver"><i class="fas fa-id-card"></i> Driver Console</li>
      <li class="nav-item" data-tab="broker"><i class="fas fa-handshake"></i> Broker Center</li>
      <li class="nav-item" data-tab="subbroker"><i class="fas fa-handshake-angle"></i> Sub-Broker</li>
      <li class="nav-item" data-tab="management"><i class="fas fa-chart-line"></i> Management</li>
    </ul>
    <div class="sidebar-bottom">
      <div style="font-size:.72rem;color:var(--muted);margin-bottom:.5rem;text-align:center;">
        <span class="sync-dot"></span>Firebase Connected
      </div>
      <button id="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="main" id="app-main" style="display:none">
    <div class="topbar">
      <div class="topbar-left">
        <h3 id="page-title">Public Portal</h3>
        <p id="page-sub">Company Profile &amp; Services</p>
      </div>
      <div class="user-badge" id="user-badge" style="display:none">
        <i class="fas fa-circle-user"></i>
        <span id="badge-name">Guest</span>
      </div>
    </div>
    <div class="content" id="main-content"></div>
  </div>

  <!-- TOASTS -->
  <div id="toasts"></div>
  <!-- PRINT AREA -->
  <div id="print-area" style="display:none;position:fixed;top:-9999px;left:-9999px;width:800px;"></div>

  <script>
    // =============================================
    // FIREBASE INIT
    // =============================================
    const firebaseConfig = {
      apiKey: "AIzaSyADNkd6C0DKL406xlyI2YznVkW9iqzEvLk",
      authDomain: "al-akl.firebaseapp.com",
      projectId: "al-akl",
      storageBucket: "al-akl.firebasestorage.app",
      messagingSenderId: "812475937817",
      appId: "1:812475937817:web:e59d21eef51a1361076688"
    };
    firebase.initializeApp(firebaseConfig);
    const fdb = firebase.firestore();

    // =============================================
    // IN-MEMORY CACHE (loaded from Firestore once)
    // =============================================
    const AppData = { users: [], trips: [], rates: null };

    const defaultRates = {
      longHaul: { cbm: 50, kg: 1.5, box: 10, q2Box: 3000 },
      middleHaul: { cbm: 30, kg: 1.0, box: 7, q2Box: 3000 },
      shortHaul: { cbm: 20, kg: 0.5, box: 5, q2Box: 3000 },
      domestic: { cbm: 10, kg: 0.2, box: 2, q2Box: 3000 },
      fullCarBase: 200, partialCarBase: 50, fullCarThreshold: 15,
      brokerPct: 10, subBrokerPct: 5
    };

    const defaultUsers = [
      { id: 'MGT001', mobile: 'management', password: 'admin123', role: 'management', name: 'Mohammed Thabit', createdAt: new Date().toISOString() },
      { id: 'DRV001', mobile: '07700000001', password: 'admin', role: 'driver', name: 'Ali Hassan', createdAt: new Date().toISOString() },
      { id: 'BRK001', mobile: '07700000002', password: 'admin', role: 'broker', name: 'Broker Ahmed', commissionPct: 10, clientIds: [], createdAt: new Date().toISOString() },
      { id: 'SBRK001', mobile: '07700000003', password: 'admin', role: 'subbroker', name: 'SubBroker Kareem', commissionPct: 5, parentBrokerId: 'BRK001', clientIds: [], createdAt: new Date().toISOString() }
    ];

    async function loadAppData() {
      setLoadMsg('Loading configuration...');
      // Rates
      const ratesDoc = await fdb.collection('config').doc('rates').get();
      if (ratesDoc.exists) {
        AppData.rates = ratesDoc.data();
      } else {
        await fdb.collection('config').doc('rates').set(defaultRates);
        AppData.rates = { ...defaultRates };
      }

      setLoadMsg('Loading users...');
      // Users
      const usersSnap = await fdb.collection('users').get();
      AppData.users = usersSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (AppData.users.length === 0) {
        setLoadMsg('Setting up default accounts...');
        const batch = fdb.batch();
        defaultUsers.forEach(u => {
          const ref = fdb.collection('users').doc(u.id);
          batch.set(ref, u);
        });

      const c = { info: '#d4af37', success: '#10b981', danger: '#ef4444', warn: '#f59e0b' };
      const t = document.createElement('div');
      t.className = 'toast';
      t.style.borderColor = c[type] || c.info;
      t.innerHTML = `<i class="fas ${icons[type]}" style="color:${c[type]}"></i> ${msg}`;
      document.getElementById('toasts').appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, 3500);
    }

    // =============================================
    // CALCULATOR ENGINE
    // =============================================
    function calcShipping(len, wid, hei, qty, q2, zone) {
      const rates = DB.getRates();
      const zr = rates[zone] || rates.domestic;
      const totalCbm = parseFloat(((len * wid * hei / 1e6) * qty).toFixed(4));
      const byVol = totalCbm * zr.cbm;
      const q2Rate = zr.q2Box !== undefined ? zr.q2Box : 3000;
      const byQ2 = q2 * q2Rate;
      const byBox = qty * zr.box;
      let baseCost = Math.max(byVol, byBox);
      let highest = baseCost + byQ2;
      let method = byVol >= byBox ? 'Volume (CBM)' : 'Standard Box Rate';
      if (q2 > 0) method += ' + Extra Boxes';
      let carType = 'Partial Car';
      if (totalCbm > rates.fullCarThreshold && totalCbm > 0) {
        carType = 'Full Car';
        highest += rates.fullCarBase;
      } else {
        highest += rates.partialCarBase;
      }
      return { totalCbm, cost: parseFloat(highest.toFixed(2)), method, carType, byQ2 };
    }

    window.submitExpense = function () {
      const tripId = document.getElementById('exp-trip').value;
      const type = document.getElementById('exp-type').value;
      const amount = parseFloat(document.getElementById('exp-amount').value) || 0;
      const notes = document.getElementById('exp-notes').value;
      if (amount <= 0) { toast('Enter valid amount', 'warn'); return; }
      const trips = DB.getTrips();
      const trip = trips.find(t => t.id === tripId);
      if (!trip) { toast('Trip not found', 'danger'); return; }
      trip.expenses.push({ type, amount, notes, date: new Date().toISOString(), driver: currentUser.name });

      toast('Expense saved to Firebase!', 'success');
      renderDriverExpenses(document.getElementById('drv-sub'));
    };

    </div>`;
    }

    function renderMgtRates(div) {
      const r = DB.getRates();
      const zones = [['domestic', 'Domestic (Baghdad)'], ['shortHaul', 'Short Haul'], ['middleHaul', 'Middle Haul'], ['longHaul', 'Long Haul']];
      div.innerHTML = `<div class="grid2">
    <div class="panel">
      <h3><i class="fas fa-tags"></i> Zone Rates</h3>
      ${zones.map(([z, lbl]) => `
        <div style="margin-bottom:1.2rem;padding:1rem;background:var(--bg3);border-radius:10px;border:1px solid var(--border)">
          <div style="font-weight:600;margin-bottom:.8rem;color:var(--gold)">${lbl}</div>
          <div class="grid3">
            <div class="form-group"><label>Per CBM (IQD)</label><input type="number" id="r-${z}-cbm" value="${r[z].cbm}" step="1"></div>
            <div class="form-group"><label>Extra Box (IQD)</label><input type="number" id="r-${z}-q2" value="${r[z].q2Box !== undefined ? r[z].q2Box : 3000}" step="1"></div>
            <div class="form-group"><label>Dim. Box (IQD)</label><input type="number" id="r-${z}-box" value="${r[z].box}" step="1"></div>
          </div>
        </div>`).join('')}
    </div>
    <div class="panel">
      <h3><i class="fas fa-sliders"></i> System Constants</h3>
      <div class="form-group"><label>Full Car Threshold (m³)</label><input type="number" id="r-fct" value="${r.fullCarThreshold}"><small style="color:var(--muted);font-size:.78rem">Volume above this = Full Car</small></div>
      <div class="form-group"><label>Full Car Base Cost (IQD)</label><input type="number" id="r-fcb" value="${r.fullCarBase}"></div>
      <div class="form-group"><label>Partial Car Base Cost (IQD)</label><input type="number" id="r-pcb" value="${r.partialCarBase}"></div>
      <hr class="div">
      <h3 style="margin-bottom:1rem"><i class="fas fa-percent"></i> Commission Defaults</h3>
      <div class="form-group"><label>Broker Default Commission (%)</label><input type="number" id="r-bpct" value="${r.brokerPct}" min="0" max="100"></div>
      <div class="form-group"><label>Sub-Broker Default Commission (%)</label><input type="number" id="r-sbpct" value="${r.subBrokerPct}" min="0" max="100"></div>
      <button class="btn btn-gold full" onclick="saveRates()"><i class="fas fa-cloud-upload-alt"></i> Save to Firebase</button>
    </div>
  </div>`;
    }

    window.saveRates = function () {
      const r = DB.getRates();
      ['domestic', 'shortHaul', 'middleHaul', 'longHaul'].forEach(z => {
        r[z].cbm = parseFloat(document.getElementById(`r-${z}-cbm`).value) || r[z].cbm;
        r[z].q2Box = parseFloat(document.getElementById(`r-${z}-q2`).value) || 3000;
        r[z].box = parseFloat(document.getElementById(`r-${z}-box`).value) || r[z].box;
      });
      r.fullCarThreshold = parseFloat(document.getElementById('r-fct').value) || r.fullCarThreshold;
      r.fullCarBase = parseFloat(document.getElementById('r-fcb').value) || r.fullCarBase;
      r.partialCarBase = parseFloat(document.getElementById('r-pcb').value) || r.partialCarBase;
      r.brokerPct = parseFloat(document.getElementById('r-bpct').value) || r.brokerPct;
      r.subBrokerPct = parseFloat(document.getElementById('r-sbpct').value) || r.subBrokerPct;
      DB.setRates(r);
      toast('Rates updated & synced to Firebase ☁️', 'success');
    };

    function renderMgtTrips(div) {
      const trips = DB.getTrips();
      const users = DB.getUsers();
      const brokers = users.filter(u => u.role === 'broker');
      const zl = { domestic: 'Domestic', shortHaul: 'Short Haul', middleHaul: 'Middle Haul', longHaul: 'Long Haul' };
      const bOpts = brokers.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
      if (!trips.length) { div.innerHTML = `<div class="panel"><p style="color:var(--muted)">No trips yet.</p></div>`; return; }
      div.innerHTML = `<div class="panel" style="overflow:auto">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
      <h3 style="margin:0"><i class="fas fa-truck"></i> All Trips (${trips.length})</h3>
      <input type="text" id="mgt-trip-search" placeholder="Search Ref Code..." style="width:220px; padding:.5rem; font-size:.85rem; border-radius:8px" onkeyup="filterMgtTrips()">
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Ref</th><th>Date</th><th>Sender</th><th>Receiver</th><th>City</th><th>Zone</th><th>Vol</th><th>Cost</th><th>Status</th><th>Assign Broker</th><th>PDF</th></tr></thead>
      <tbody id="mgt-trips-tbody">${trips.map(t => `<tr>
        <td><span class="badge badge-blue">${t.id}</span></td>
        <td>${new Date(t.createdAt).toLocaleDateString()}</td>
        <td>${t.senderName}</td><td>${t.receiverName}</td><td>${t.receiverCity}</td>
        <td>${zl[t.zone] || t.zone}</td>
        <td>${t.totalCbm}m³</td>
        <td style="color:var(--success);font-weight:700">IQD ${t.cost}</td>
        <td><select style="padding:.3rem;font-size:.78rem;width:110px" onchange="assignStatus('${t.id}',this.value)">
          <option ${t.status === 'Pending' ? 'selected' : ''}>Pending</option>
          <option ${t.status === 'In Transit' ? 'selected' : ''}>In Transit</option>
          <option ${t.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
        </select></td>
        <td><select style="padding:.3rem;font-size:.78rem;width:120px" onchange="assignBroker('${t.id}',this.value)">
          <option value="">None</option>${bOpts}
        </select></td>
        <td><button class="btn btn-gold btn-sm" onclick='generatePDF(${JSON.stringify(t)})'><i class="fas fa-file-pdf"></i></button></td>
      </tr>`).join('')}
      </tbody>
    </table></div></div>`;
    }

    window.filterMgtTrips = function() {
      const q = document.getElementById('mgt-trip-search').value.toLowerCase();
      const rows = document.querySelectorAll('#mgt-trips-tbody tr');
      rows.forEach(r => {
        const ref = r.querySelector('td:first-child').textContent.toLowerCase();
        if (ref.includes(q)) r.style.display = '';
        else r.style.display = 'none';
      });
    };

    window.assignStatus = function (id, status) {
      const t = DB.getTrips().find(t => t.id === id);
      if (t) { t.status = status; DB.updateTrip(t); toast('Status updated & synced', 'success'); }
    };
    window.assignBroker = function (id, bId) {
      const trips = DB.getTrips();
      const t = trips.find(t => t.id === id);
      if (!t) return;
      t.brokerId = bId;
      DB.updateTrip(t);
      if (bId) {
        const users = DB.getUsers();
        const b = users.find(u => u.id === bId);
        if (b) {
          if (!b.clientIds) b.clientIds = [];
          if (!b.clientIds.includes(t.clientId)) b.clientIds.push(t.clientId);
          DB.updateUser(b);
        }
      }
      toast('Broker assigned & synced to Firebase', 'success');
    };

    function renderMgtBrokers(div) {
      const users = DB.getUsers();
      const trips = DB.getTrips();
      const rates = DB.getRates();
      const people = users.filter(u => u.role === 'driver' || u.role === 'broker' || u.role === 'subbroker');
      const roleColors = { driver: 'badge-green', broker: 'badge-gold', subbroker: 'badge-blue' };
      const brokerOpts = users.filter(u => u.role === 'broker').map(b => `<option value="${b.id}">${b.name}</option>`).join('');
      div.innerHTML = `
    <div class="panel" style="margin-bottom:1.5rem">
      <h3><i class="fas fa-users-cog"></i> Edit People — Drivers, Brokers & Sub-Brokers</h3>
      <p style="font-size:.83rem;color:var(--muted);margin-bottom:1rem">Change name or phone number then click <strong>Save</strong>.</p>
      ${people.length ? `<div class="table-wrap"><table>
        <thead><tr><th>Role</th><th>Name</th><th>Mobile / Phone</th><th style="min-width:170px">Commission %</th><th>Save</th></tr></thead>
        <tbody>${people.map(p => {
        const pct = p.commissionPct || (p.role === 'broker' ? rates.brokerPct : p.role === 'subbroker' ? rates.subBrokerPct : '');
        return `<tr>
            <td><span class="badge ${roleColors[p.role] || 'badge-blue'}">${p.role}</span></td>
            <td><input id="pn-name-${p.id}" value="${p.name}" style="width:130px;padding:.3rem .5rem;font-size:.83rem"></td>
            <td><input id="pn-mob-${p.id}" value="${p.mobile}" style="width:140px;padding:.3rem .5rem;font-size:.83rem"></td>
            <td>${p.role !== 'driver' ? `<div class="flex gap1"><input type="number" id="pn-pct-${p.id}" value="${pct}" style="width:65px;padding:.3rem .5rem;font-size:.82rem" min="0" max="100"><span style="font-size:.8rem;color:var(--muted)">%</span></div>` : '<span style="color:var(--muted);font-size:.8rem">N/A</span>'}</td>
            <td><button class="btn btn-gold btn-sm" onclick="savePersonInfo('${p.id}')"><i class="fas fa-save"></i> Save</button></td>
          </tr>`;
      }).join('')}
        </tbody>
      </table></div>` : '<p style="color:var(--muted)">No drivers, brokers or sub-brokers yet.</p>'}
    </div>
    <div class="grid2">
      <div class="panel">
        <h3><i class="fas fa-user-plus"></i> Add New Person</h3>
        <div class="form-group"><label>Full Name</label><input id="nb-name" placeholder="Full name"></div>
        <div class="form-group"><label>Mobile / Username</label><input id="nb-mob" placeholder="07X XXX XXXX"></div>
        <div class="form-group"><label>Password</label><input id="nb-pass" type="password" placeholder="Set password"></div>
        <div class="form-group"><label>Role</label>
          <select id="nb-role" onchange="
            document.getElementById('nb-pg').style.display=this.value==='subbroker'?'block':'none';
            document.getElementById('nb-pct-wrap').style.display=this.value==='driver'?'none':'block';">
            <option value="driver">Driver</option>
            <option value="broker">Broker (${rates.brokerPct}% default)</option>
            <option value="subbroker">Sub-Broker (${rates.subBrokerPct}% default)</option>
          </select>
        </div>
        <div id="nb-pct-wrap" style="display:none" class="form-group"><label>Commission %</label><input type="number" id="nb-pct" value="${rates.brokerPct}" min="0" max="100"></div>
        <div id="nb-pg" style="display:none" class="form-group"><label>Parent Broker</label>
          <select id="nb-parent">${brokerOpts || '<option value="">No brokers yet</option>'}</select>
        </div>
        <button class="btn btn-gold full" onclick="addPerson()"><i class="fas fa-cloud-upload-alt"></i> Add to Firebase</button>
      </div>
      <div class="panel">
        <h3><i class="fas fa-info-circle"></i> Roles Guide</h3>
        <div class="exp-item"><div><div style="font-weight:600">Driver</div><div style="font-size:.78rem;color:var(--muted)">Handles trips, logs expenses. No commission.</div></div><span class="badge badge-green">driver</span></div>
        <div class="exp-item" style="margin-top:.6rem"><div><div style="font-weight:600">Broker</div><div style="font-size:.78rem;color:var(--muted)">Earns commission on their client trips.</div></div><span class="badge badge-gold">broker</span></div>
        <div class="exp-item" style="margin-top:.6rem"><div><div style="font-weight:600">Sub-Broker</div><div style="font-size:.78rem;color:var(--muted)">Override commission through parent broker's network.</div></div><span class="badge badge-blue">subbroker</span></div>
      </div>
    </div>`;
    }

    window.savePersonInfo = function (uid) {
      const users = DB.getUsers();
      const u = users.find(u => u.id === uid);
      if (!u) return;
      const nameEl = document.getElementById('pn-name-' + uid);
      const mobEl = document.getElementById('pn-mob-' + uid);
      const pctEl = document.getElementById('pn-pct-' + uid);
      if (nameEl) u.name = nameEl.value.trim() || u.name;
      if (mobEl) u.mobile = mobEl.value.trim() || u.mobile;
      if (pctEl) u.commissionPct = parseFloat(pctEl.value) || u.commissionPct;
      DB.updateUser(u);
      toast(u.name + ' updated & synced to Firebase', 'success');
    };

    window.setBrokerPct = function (uid) {
      const pct = parseFloat(document.getElementById('bp-' + uid).value) || 0;
      const users = DB.getUsers();
      const u = users.find(u => u.id === uid);
      if (u) { u.commissionPct = pct; DB.updateUser(u); toast('Commission updated & synced', 'success'); }
    };

    window.addPerson = function () {
      const name = document.getElementById('nb-name').value.trim();
      const mob = document.getElementById('nb-mob').value.trim();
      const pass = document.getElementById('nb-pass').value.trim();
      const role = document.getElementById('nb-role').value;
      if (!name || !mob || !pass) { toast('Fill all fields', 'warn'); return; }
      const users = DB.getUsers();
      if (users.find(u => u.mobile === mob)) { toast('Mobile already exists', 'danger'); return; }
      const rates = DB.getRates();
      let prefix = role === 'driver' ? 'DRV' : role === 'broker' ? 'BRK' : 'SBRK';
      const pctEl = document.getElementById('nb-pct');
      const nu = {
        id: prefix + Date.now(), mobile: mob, password: pass, role, name,
        commissionPct: role !== 'driver' ? (parseFloat(pctEl && pctEl.value) || (role === 'broker' ? rates.brokerPct : rates.subBrokerPct)) : 0,
        clientIds: [], createdAt: new Date().toISOString()
      };
      if (role === 'subbroker') { const pe = document.getElementById('nb-parent'); if (pe) nu.parentBrokerId = pe.value; }
      AppData.users.push(nu);
      fdb.collection('users').doc(nu.id).set(nu);
      toast(name + ' added to Firebase (' + role + ')', 'success');
      renderMgtBrokers(document.getElementById('mgt-sub'));
    };

    window.addBroker = window.addPerson;

    function renderMgtUsers(div) {
      const users = DB.getUsers();
      const trips = DB.getTrips();
      const rc = { management: 'badge-gold', client: 'badge-blue', driver: 'badge-green', broker: 'badge-warn', subbroker: 'badge-red' };
      div.innerHTML = `<div class="panel"><h3><i class="fas fa-users"></i> All System Users (${users.length})</h3>
    <div class="table-wrap"><table>
      <thead><tr><th>Name</th><th>Mobile</th><th>Role</th><th>Joined</th><th>Trips</th></tr></thead>
      <tbody>${users.map(u => `<tr>
        <td>${u.name}</td><td>${u.mobile}</td>
        <td><span class="badge ${rc[u.role] || 'badge-blue'}">${u.role}</span></td>
        <td>${u.createdAt ? new Date(u.createdAt).toLocaleDateString() : 'System'}</td>
        <td>${trips.filter(t => t.clientId === u.id).length}</td>
      </tr>`).join('')}
      </tbody>
    </table></div></div>`;
    }

    // =============================================
    // APP INIT — load Firebase data then show app
    // =============================================
    async function initApp() {
      try {
        await loadAppData();
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('app-sidebar').style.display = 'flex';
        document.getElementById('app-main').style.display = 'flex';
        let targetTab = 'public';
        try {
          const saved = localStorage.getItem('al_akl_session');
          if (saved) {
            const { mobile, pass } = JSON.parse(saved);
            const user = DB.getUser(mobile, pass);
            if (user) {
              currentUser = user;
              targetTab = user.role;
            }
          }
        } catch (e) {}
        switchTab(targetTab);
      } catch (err) {
        console.error(err);
        setLoadMsg('⚠️ Firebase connection failed. Check console. Error: ' + err.message);
      }
    }

    initApp();
  </script>
</body>

</html>
